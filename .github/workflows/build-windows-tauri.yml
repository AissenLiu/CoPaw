name: Build Windows Tauri Desktop

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build desktop package
        shell: pwsh
        run: |
          ./scripts/build_tauri_windows.ps1 -OutputRoot "$env:RUNNER_TEMP\copaw-desktop" -CleanOutput

      - name: Upload desktop zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: copaw-windows-tauri-desktop
          path: |
            ${{ runner.temp }}\copaw-desktop\CoPaw-Desktop-Windows-*.zip
            ${{ runner.temp }}\copaw-desktop\CoPaw-Desktop-Windows-*.zip.sha256
