name: Build Windows Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional GitHub release tag to upload assets (e.g. v0.0.4)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-windows-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  portable:
    name: Build Portable Package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Build Windows portable package
        shell: pwsh
        run: |
          ./scripts/build_portable_windows.ps1 -OutputRoot "$env:RUNNER_TEMP\copaw-portable" -CleanOutput

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: copaw-windows-portable
          path: |
            ${{ runner.temp }}\copaw-portable\CoPaw-Windows-Portable-*.zip
            ${{ runner.temp }}\copaw-portable\CoPaw-Windows-Portable-*.zip.sha256

  release_assets:
    name: Upload Release Assets
    if: ${{ inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    needs: [portable]
    steps:
      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: copaw-windows-portable
          path: out/portable

      - name: List files to publish
        run: |
          ls -lah out/portable

      - name: Upload files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            out/portable/*.zip
            out/portable/*.zip.sha256
          overwrite_files: true
          fail_on_unmatched_files: true
