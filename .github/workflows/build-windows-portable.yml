name: Build Windows Portable

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Build Windows portable package
        shell: pwsh
        run: |
          ./scripts/build_portable_windows.ps1 -OutputRoot "$env:RUNNER_TEMP\copaw-portable" -CleanOutput

      - name: List build outputs
        shell: pwsh
        run: |
          Get-ChildItem "$env:RUNNER_TEMP\copaw-portable" -Recurse | Select-Object FullName

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: copaw-windows-portable
          path: |
            ${{ runner.temp }}\copaw-portable\CoPaw-Windows-Portable-*.zip
            ${{ runner.temp }}\copaw-portable\CoPaw-Windows-Portable-*.zip.sha256
